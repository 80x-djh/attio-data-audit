async function unlock(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64(SALT),iterations:ITER,hash:"SHA-256"},
    km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64(IV)},key,b64(CT));
  return new TextDecoder().decode(buf);
}
document.getElementById("f").addEventListener("submit",async e=>{
  e.preventDefault();
  const err=document.getElementById("err"), btn=document.getElementById("btn");
  err.textContent=""; btn.disabled=true; btn.textContent="Decrypting…";
  try{
    const html=await unlock(document.getElementById("pw").value);
    document.open(); document.write(html); document.close();
  }catch(_){
    err.textContent="Incorrect password.";
    btn.disabled=false; btn.textContent="Unlock report";
    document.getElementById("pw").select();
  }
});
